name: Render Flutter Tutorial Reel

on:
  repository_dispatch:
    types: [render_reel]
  workflow_dispatch: # أضفت دي عشان تقدر تشغله يدوياً للتجربة من موقع جيتهاب

concurrency:
  group: render-reel-${{ github.ref }}
  cancel-in-progress: false

env:
  FLUTTER_VERSION: "3.22.0"
  NODE_VERSION: "20"
  REMOTION_PROJECT_DIR: remotion-project

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 1 – VALIDATE PAYLOAD
  # ─────────────────────────────────────────────────────────────────────────────
  validate:
    name: Validate Dispatch Payload
    runs-on: ubuntu-latest
    outputs:
      steps_json: ${{ steps.parse.outputs.steps_json }}
      step_count: ${{ steps.parse.outputs.step_count }}
      video_title: ${{ steps.parse.outputs.video_title }}

    steps:
      - name: Parse & validate payload
        id: parse
        run: |
          PAYLOAD='${{ toJson(github.event.client_payload) }}'
          
          # لو تشغيل يدوي (Workflow Dispatch) بنحط بيانات تجريبية
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            PAYLOAD='{"title":"manual-test","steps":[{"step":1,"code":"import \"package:flutter/material.dart\"; void main()=>runApp(MaterialApp(home:Scaffold(body:Center(child:Text(\"Success!\")))));","duration_in_frames":60}]}'
          fi

          echo "Raw payload:"
          echo "$PAYLOAD" | jq .

          STEP_COUNT=$(echo "$PAYLOAD" | jq '.steps | length')
          VIDEO_TITLE=$(echo "$PAYLOAD" | jq -r '.title // "flutter-tutorial"')
          STEPS_JSON=$(echo "$PAYLOAD" | jq -c '.steps')

          echo "step_count=$STEP_COUNT"   >> "$GITHUB_OUTPUT"
          echo "video_title=$VIDEO_TITLE" >> "$GITHUB_OUTPUT"

          {
            echo "steps_json<<EOF_STEPS_JSON"
            echo "$STEPS_JSON"
            echo "EOF_STEPS_JSON"
          } >> "$GITHUB_OUTPUT"

  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 2 – BUILD FLUTTER WEB APPS PER STEP
  # ─────────────────────────────────────────────────────────────────────────────
  build-flutter:
    name: Build Flutter Web (all steps)
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter ${{ env.FLUTTER_VERSION }}
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Build each Flutter step
        env:
          STEPS_JSON: ${{ needs.validate.outputs.steps_json }}
        run: |
          set -euo pipefail
          STEP_COUNT=$(echo "$STEPS_JSON" | jq length)
          PUBLIC_DIR="${{ env.REMOTION_PROJECT_DIR }}/public"
          mkdir -p "$PUBLIC_DIR"

          # إنشاء مشروع فلاتر نظيف داخل السيرفر لتجنب مشاكل الملفات الناقصة
          flutter create --platforms web flutter_workdir

          for i in $(seq 0 $(( STEP_COUNT - 1 ))); do
            STEP_NUM=$(echo "$STEPS_JSON" | jq -r ".[$i].step")
            CODE=$(echo "$STEPS_JSON"     | jq -r ".[$i].code")

            echo "Building Step $STEP_NUM..."

            # مسح ملف المين الافتراضي وكتابة كود المستخدم
            rm -f flutter_workdir/lib/main.dart
            printf '%s' "$CODE" > flutter_workdir/lib/main.dart

            # بناء الويب باستخدام CanvasKit
            cd flutter_workdir
            flutter build web --web-renderer canvaskit --release
            cd ..

            # نقل الناتج لمجلد ريموشن العام
            DEST="$PUBLIC_DIR/flutter_step_${STEP_NUM}"
            rm -rf "$DEST"
            cp -r flutter_workdir/build/web "$DEST"
          done

      - name: Upload Flutter builds
        uses: actions/upload-artifact@v4
        with:
          name: flutter-builds
          path: ${{ env.REMOTION_PROJECT_DIR }}/public/
          retention-days: 1

  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 3 – RENDER VIDEO WITH REMOTION
  # ─────────────────────────────────────────────────────────────────────────────
  render:
    name: Render Remotion Video
    runs-on: ubuntu-latest
    needs: [validate, build-flutter]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Chromium system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libnss3 libatk1.0-0 libatk-bridge2.0-0 libcups2 \
            libxcomposite1 libxdamage1 libxfixes3 libxrandr2 \
            libgbm1 libpango-1.0-0 libpangocairo-1.0-0 \
            libasound2t64 libxshmfence1 libxkbcommon0 \
            fonts-noto fonts-noto-cjk
            

      - name: Install Node dependencies
        working-directory: ${{ env.REMOTION_PROJECT_DIR }}
        run: npm ci || npm install

      - name: Download Flutter build artifacts
        uses: actions/download-artifact@v4
        with:
          name: flutter-builds
          path: ${{ env.REMOTION_PROJECT_DIR }}/public/

      - name: Render video with Remotion
        working-directory: ${{ env.REMOTION_PROJECT_DIR }}
        env:
          VIDEO_TITLE: ${{ needs.validate.outputs.video_title }}
        run: |
          # كتابة ملف الخطوات لريموشن
          echo '${{ needs.validate.outputs.steps_json }}' > public/steps.json
          
          # حساب إجمالي الفريمات
          TOTAL_FRAMES=$(echo '${{ needs.validate.outputs.steps_json }}' | jq '[.[].duration_in_frames] | add')
          
          # أمر الريندر النهائي
          npx remotion render FlutterReel \
            --output "out/${VIDEO_TITLE}.mp4" \
            --props '{"stepsJsonPath":"/steps.json"}' \
            --frames 0-$(( TOTAL_FRAMES - 1 )) \
            --concurrency 4

      - name: Upload final MP4
        uses: actions/upload-artifact@v4
        with:
          name: rendered-video
          path: ${{ env.REMOTION_PROJECT_DIR }}/out/*.mp4
          
